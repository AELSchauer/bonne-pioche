test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# S3-compatible storage (AWS S3, Cloudflare R2, Backblaze B2, etc).
# Set S3_ENDPOINT only for non-AWS providers (e.g. R2); leave it unset for real AWS S3.
s3:
  service: S3
  access_key_id: <%= ENV["S3_ACCESS_KEY_ID"] %>
  secret_access_key: <%= ENV["S3_SECRET_ACCESS_KEY"] %>
  region: <%= ENV.fetch("S3_REGION", "auto") %>
  bucket: <%= ENV["S3_BUCKET"] %>
  # Recent aws-sdk-s3 versions default to sending AWS-specific integrity checksums
  # that R2 (and other non-AWS S3-compatible providers) reject with
  # "You can only specify one non-default checksum at a time." Opt back into the
  # older, universally-compatible behavior.
  request_checksum_calculation: when_required
  response_checksum_validation: when_required
  <% if ENV["S3_ENDPOINT"].present? %>
  endpoint: <%= ENV["S3_ENDPOINT"] %>
  <% end %>
